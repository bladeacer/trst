version: 2

project_name: trst

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/bladeacer/trst/config.AppVersion={{.Version}}
    main: ./cmd/trst
    binary: trst

archives:
  - name_template: "trst_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

# FIX: Removed the deprecated release.github nesting. 
# GoReleaser cleanly handles the rest using your GITHUB_TOKEN target repo bounds automatically.
release:
  github: {}
